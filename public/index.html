<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Points de Prélèvement GPS — ANRAC</title>
<meta name="description" content="Outil de terrain pour définir une parcelle agricole et placer des points de prélèvement GPS avec export des coordonnées.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --panel:     #161b22;
    --border:    #30363d;
    --olive:     #6a7c3e;
    --olive-lit: #8fa84f;
    --amber:     #e6a817;
    --red:       #cf4a4a;
    --text:      #cdd9e5;
    --muted:     #768390;
    --mono:      'Share Tech Mono', monospace;
    --ui:        'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    height: 100vh;
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 300px 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 20px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--olive-lit);
    letter-spacing: 2px;
    border: 1px solid var(--olive);
    padding: 3px 8px;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
  }
  .header-status {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--olive-lit); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── SIDEBAR ── */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--olive-lit);
    letter-spacing: 2px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    width: 12px; height: 1px;
    background: var(--olive-lit);
  }

  /* mode buttons */
  .mode-group { display: flex; gap: 6px; }
  .btn {
    font-family: var(--ui);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    flex: 1;
  }
  .btn:hover { border-color: var(--olive); color: var(--olive-lit); }
  .btn.active { background: var(--olive); border-color: var(--olive); color: #fff; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn.amber { border-color: var(--amber); color: var(--amber); }
  .btn.amber:hover { background: var(--amber); color: #000; }
  .btn-full { width: 100%; margin-top: 6px; }

  /* stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 8px 10px;
  }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-family: var(--mono); font-size: 20px; color: var(--olive-lit); margin-top: 2px; }
  .stat-unit { font-size: 10px; color: var(--muted); }

  /* point list */
  .point-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .point-list::-webkit-scrollbar { width: 4px; }
  .point-list::-webkit-scrollbar-track { background: var(--bg); }
  .point-list::-webkit-scrollbar-thumb { background: var(--border); }

  .point-item {
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background .1s;
    position: relative;
  }
  .point-item:hover { background: rgba(106,124,62,.1); }
  .point-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--olive-lit);
    min-width: 28px;
  }
  .point-coords {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    line-height: 1.5;
  }
  .point-delete {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color .1s;
  }
  .point-delete:hover { color: var(--red); }
  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
  }

  /* export */
  .export-group { display: flex; gap: 6px; }

  /* ── MAP ── */
  #map {
    width: 100%;
    height: 100%;
    background: #0d1117;
  }

  /* Leaflet overrides */
  .leaflet-control-zoom a,
  .leaflet-draw-toolbar a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-draw-toolbar a:hover { background: var(--olive) !important; }
  .leaflet-bar { border-color: var(--border) !important; }
  .leaflet-popup-content-wrapper {
    background: var(--panel);
    border: 1px solid var(--olive);
    border-radius: 0;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
  }
  .leaflet-popup-tip { background: var(--panel); }
  .leaflet-popup-close-button { color: var(--muted) !important; }

  /* crosshair cursor when in point mode */
  #map.point-mode { cursor: crosshair !important; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--panel);
    border: 1px solid var(--olive);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--olive-lit);
    z-index: 9999;
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: 52px auto 1fr;
    }
    aside {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 45vh;
      overflow-y: auto;
    }
    .point-list { max-height: 120px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ANRAC</div>
  <h1>Points de Prélèvement GPS</h1>
  <div class="header-status">
    <div class="dot"></div>
    <span id="status-text">EN ATTENTE</span>
  </div>
</header>

<aside>
  <!-- Mode -->
  <div class="section">
    <div class="section-title">Mode</div>
    <div class="mode-group">
      <button class="btn active" id="btn-draw" onclick="setMode('draw')">▭ Parcelle</button>
      <button class="btn" id="btn-point" onclick="setMode('point')">⊕ Prélèvement</button>
    </div>
    <button class="btn danger btn-full" onclick="clearAll()">✕ Tout effacer</button>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-title">Statistiques</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Surface</div>
        <div class="stat-value" id="stat-area">0</div>
        <div class="stat-unit">hectares</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Prélèvements</div>
        <div class="stat-value" id="stat-pts">0</div>
        <div class="stat-unit">points</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Densité</div>
        <div class="stat-value" id="stat-density">—</div>
        <div class="stat-unit">pts / ha</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Périmètre</div>
        <div class="stat-value" id="stat-perim">0</div>
        <div class="stat-unit">mètres</div>
      </div>
    </div>
  </div>

  <!-- Export -->
  <div class="section">
    <div class="section-title">Export</div>
    <div class="export-group">
      <button class="btn amber" onclick="exportCSV()">↓ CSV</button>
      <button class="btn amber" onclick="exportGeoJSON()">↓ GeoJSON</button>
      <button class="btn amber" onclick="exportKML()">↓ KML</button>
    </div>
  </div>

  <!-- Point list -->
  <div class="section" style="padding-bottom:8px;">
    <div class="section-title">Liste des points</div>
  </div>
  <div class="point-list" id="point-list">
    <div class="empty-state">Dessinez d'abord votre parcelle,<br>puis cliquez pour ajouter<br>des points de prélèvement.</div>
  </div>
</aside>

<!-- MAP -->
<div id="map"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
// ── State
let mode = 'draw';
let parcelLayer = null;
let parcelPolygon = null;
let points = [];
let markers = [];
let pointIdCounter = 1;

// ── Map init (centré sur le Rif marocain)
const map = L.map('map', {
  center: [34.95, -4.8],
  zoom: 11,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CartoDB',
  maxZoom: 20
}).addTo(map);

// ── Draw controls
const drawnItems = new L.FeatureGroup().addTo(map);
const drawControl = new L.Control.Draw({
  edit: { featureGroup: drawnItems, edit: false, remove: false },
  draw: {
    polygon: {
      shapeOptions: { color: '#8fa84f', weight: 2, fillColor: '#6a7c3e', fillOpacity: 0.15 },
      showArea: true,
      metric: true
    },
    rectangle: false, circle: false, marker: false,
    polyline: false, circlemarker: false
  }
});
map.addControl(drawControl);

// Hide native draw toolbar — we manage mode via sidebar buttons
setTimeout(() => {
  const tb = document.querySelector('.leaflet-draw');
  if (tb) tb.style.display = 'none';
}, 100);

// ── Mode management
let drawHandler = null;

function setMode(m) {
  mode = m;
  document.getElementById('btn-draw').classList.toggle('active', m === 'draw');
  document.getElementById('btn-point').classList.toggle('active', m === 'point');
  document.getElementById('map').classList.toggle('point-mode', m === 'point');

  if (m === 'draw') {
    stopDrawHandler();
    startPolygonDraw();
    setStatus('DESSIN PARCELLE');
  } else {
    stopDrawHandler();
    setStatus(parcelLayer ? 'AJOUT POINTS — cliquez sur la carte' : 'DESSINEZ D\'ABORD UNE PARCELLE');
  }
}

function startPolygonDraw() {
  drawHandler = new L.Draw.Polygon(map, {
    shapeOptions: { color: '#8fa84f', weight: 2, fillColor: '#6a7c3e', fillOpacity: 0.15 }
  });
  drawHandler.enable();
}

function stopDrawHandler() {
  if (drawHandler) { try { drawHandler.disable(); } catch(e){} drawHandler = null; }
}

// ── Draw events
map.on(L.Draw.Event.CREATED, function(e) {
  if (parcelLayer) drawnItems.removeLayer(parcelLayer);
  parcelLayer = e.layer;
  parcelPolygon = parcelLayer.getLatLngs()[0];
  drawnItems.addLayer(parcelLayer);
  updateStats();
  setMode('point');
  toast('Parcelle définie — cliquez pour ajouter des points');
});

// ── Map click → add point
map.on('click', function(e) {
  if (mode !== 'point') return;
  if (!parcelLayer) { toast('⚠ Dessinez d\'abord une parcelle', true); return; }
  if (!isInsidePolygon(e.latlng, parcelPolygon)) { toast('⚠ Point hors de la parcelle', true); return; }
  addPoint(e.latlng);
});

function addPoint(latlng) {
  const id = pointIdCounter++;
  const label = 'P' + String(id).padStart(3, '0');
  points.push({ id, label, lat: latlng.lat, lng: latlng.lng });

  const icon = L.divIcon({
    html: `<div style="
      background:#e6a817;color:#000;
      font-family:'Share Tech Mono',monospace;
      font-size:9px;font-weight:700;
      width:28px;height:28px;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #0d1117;
      border-radius:50%;
      box-shadow:0 0 0 1px #e6a817;
    ">${label}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });

  const marker = L.marker(latlng, { icon })
    .addTo(map)
    .bindPopup(`<b>${label}</b><br>Lat: ${latlng.lat.toFixed(6)}<br>Lng: ${latlng.lng.toFixed(6)}`);

  markers.push({ id, marker });
  updateStats();
  renderList();
}

function deletePoint(id) {
  const mi = markers.findIndex(m => m.id === id);
  if (mi !== -1) { map.removeLayer(markers[mi].marker); markers.splice(mi, 1); }
  points = points.filter(p => p.id !== id);
  updateStats();
  renderList();
}

function clearAll() {
  points = [];
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];
  if (parcelLayer) { drawnItems.removeLayer(parcelLayer); parcelLayer = null; parcelPolygon = null; }
  pointIdCounter = 1;
  updateStats();
  renderList();
  setMode('draw');
  toast('Carte réinitialisée');
}

// ── Point-in-polygon (ray casting)
function isInsidePolygon(point, polygon) {
  let inside = false;
  const x = point.lng, y = point.lat;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].lng, yi = polygon[i].lat;
    const xj = polygon[j].lng, yj = polygon[j].lat;
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

// ── Stats
function calcArea(latlngs) {
  let area = 0;
  const n = latlngs.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const lat1 = latlngs[i].lat * Math.PI / 180;
    const lat2 = latlngs[j].lat * Math.PI / 180;
    const lng1 = latlngs[i].lng * Math.PI / 180;
    const lng2 = latlngs[j].lng * Math.PI / 180;
    area += (lng2 - lng1) * (2 + Math.sin(lat1) + Math.sin(lat2));
  }
  return Math.abs(area * 6378137 * 6378137 / 2);
}

function calcPerimeter(latlngs) {
  let total = 0;
  for (let i = 0; i < latlngs.length; i++) {
    const j = (i + 1) % latlngs.length;
    total += latlngs[i].distanceTo(latlngs[j]);
  }
  return total;
}

function updateStats() {
  const n = points.length;
  document.getElementById('stat-pts').textContent = n;
  if (parcelPolygon) {
    const area = calcArea(parcelPolygon) / 10000;
    const perim = calcPerimeter(parcelPolygon);
    document.getElementById('stat-area').textContent = area.toFixed(2);
    document.getElementById('stat-perim').textContent = Math.round(perim);
    document.getElementById('stat-density').textContent = area > 0 ? (n / area).toFixed(1) : '—';
  } else {
    document.getElementById('stat-area').textContent = '0';
    document.getElementById('stat-perim').textContent = '0';
    document.getElementById('stat-density').textContent = '—';
  }
}

// ── Render list
function renderList() {
  const el = document.getElementById('point-list');
  if (points.length === 0) {
    el.innerHTML = '<div class="empty-state">Dessinez d\'abord votre parcelle,<br>puis cliquez pour ajouter<br>des points de prélèvement.</div>';
    return;
  }
  el.innerHTML = points.map(p => `
    <div class="point-item" onclick="focusPoint(${p.id})">
      <span class="point-num">${p.label}</span>
      <div class="point-coords">
        ${p.lat.toFixed(6)}<br>
        ${p.lng.toFixed(6)}
      </div>
      <button class="point-delete" onclick="event.stopPropagation();deletePoint(${p.id})">✕</button>
    </div>
  `).join('');
}

function focusPoint(id) {
  const p = points.find(x => x.id === id);
  if (!p) return;
  map.setView([p.lat, p.lng], 16);
  const m = markers.find(x => x.id === id);
  if (m) m.marker.openPopup();
}

// ── Exports
function exportCSV() {
  if (!points.length) { toast('⚠ Aucun point à exporter', true); return; }
  const rows = ['ID,Label,Latitude,Longitude', ...points.map(p => `${p.id},${p.label},${p.lat.toFixed(8)},${p.lng.toFixed(8)}`)];
  download('prelevements.csv', rows.join('\n'), 'text/csv');
  toast('✓ CSV exporté');
}

function exportGeoJSON() {
  if (!points.length) { toast('⚠ Aucun point à exporter', true); return; }
  const geojson = {
    type: 'FeatureCollection',
    features: points.map(p => ({
      type: 'Feature',
      properties: { id: p.id, label: p.label },
      geometry: { type: 'Point', coordinates: [p.lng, p.lat] }
    }))
  };
  if (parcelPolygon) {
    geojson.features.push({
      type: 'Feature',
      properties: { type: 'parcelle' },
      geometry: { type: 'Polygon', coordinates: [parcelPolygon.map(ll => [ll.lng, ll.lat]).concat([[parcelPolygon[0].lng, parcelPolygon[0].lat]])] }
    });
  }
  download('prelevements.geojson', JSON.stringify(geojson, null, 2), 'application/json');
  toast('✓ GeoJSON exporté');
}

function exportKML() {
  if (!points.length) { toast('⚠ Aucun point à exporter', true); return; }
  const placemarks = points.map(p => `
  <Placemark>
    <name>${p.label}</name>
    <Point><coordinates>${p.lng.toFixed(8)},${p.lat.toFixed(8)},0</coordinates></Point>
  </Placemark>`).join('');
  const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document><name>Prélèvements ANRAC</name>${placemarks}
</Document></kml>`;
  download('prelevements.kml', kml, 'application/vnd.google-earth.kml+xml');
  toast('✓ KML exporté');
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Toast
let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function setStatus(t) {
  document.getElementById('status-text').textContent = t;
}

// ── Init
setMode('draw');
</script>
</body>
</html>
